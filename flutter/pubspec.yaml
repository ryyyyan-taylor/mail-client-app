name: mail_client
description: "Gmail client — dark-themed, serverless, Android-first."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Auth
  google_sign_in: ^6.2.1

  # HTTP
  dio: ^5.7.0

  # Database
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Background sync
  workmanager: ^0.9.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Permissions (Android 13+ POST_NOTIFICATIONS)
  permission_handler: ^11.3.1

  # WebView
  webview_flutter: ^4.10.0

  # Date formatting
  intl: ^0.19.0

  # Serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
